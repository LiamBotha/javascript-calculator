<!DOCTYPE html>
<html lang="en">
<head>
    <Title>Javascript Calculator</Title>
    <meta charset="UTC-8">
    <link rel="stylesheet" href="css/main.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="container">
        <div id="calculator">
            <div id="display"><p>0</p></div>
            <div class="btn btn-red op" data-btn="C">C</div>
            <div class="btn op" data-btn="DEL"><i class="material-icons">backspace</i></div>
            <div class="btn op" data-btn="%">%</div>
            <div class="btn op" data-btn="/">&divide</div>

            <div class="btn num" data-btn="7">7</div>
            <div class="btn num" data-btn="8">8</div>
            <div class="btn num" data-btn="9">9</div>
            <div class="btn op" data-btn="*">&times</div>

            <div class="btn num" data-btn="4">4</div>
            <div class="btn num" data-btn="5">5</div>
            <div class="btn num" data-btn="6">6</div>
            <div class="btn op" data-btn="-">-</div>

            <div class="btn num" data-btn="1">1</div>
            <div class="btn num" data-btn="2">2</div>
            <div class="btn num" data-btn="3">3</div>
            <div class="btn op" data-btn="+">+</div>

            <div class="btn num op" data-btn="Negate">+ / -</div>
            <div class="btn num" data-btn="0">0</div>
            <div class="btn num" data-btn=".">.</div>
            <div class="btn btn-blue btn-equals op" data-btn="=">=</div>
        </div>
    </div>
    <script type='module' src="app.js"></script>
</body>
</html>
